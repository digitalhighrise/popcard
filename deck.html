<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deck — Popcard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <a href="/" class="brand">
        <div class="brand-logo" aria-label="Popcard logo">
          <svg viewBox="0 0 56 56" width="44" height="44">
            <g>
              <rect x="3" y="6" width="14" height="44" rx="6" fill="#FF3DA0" transform="rotate(-12 10 28)"/>
              <rect x="6" y="6" width="14" height="44" rx="6" fill="#FF8A3D" transform="rotate(-7 13 28)"/>
              <rect x="9" y="6" width="14" height="44" rx="6" fill="#FFD338" transform="rotate(-2 16 28)"/>
              <rect x="12" y="6" width="14" height="44" rx="6" fill="#2BC489" transform="rotate(3 19 28)"/>
              <rect x="15" y="6" width="14" height="44" rx="6" fill="#3DAEFF" transform="rotate(8 22 28)"/>
            </g>
            <path d="M14 6 H40 A8 8 0 0 1 48 14 V38 A8 8 0 0 1 40 46 H28 L18 54 L20 46 A6 6 0 0 1 14 40 V6 Z" fill="#6E3DEA"/>
            <circle cx="22" cy="22" r="2.4" fill="#fff"/>
            <circle cx="34" cy="22" r="2.4" fill="#fff"/>
            <path d="M22 30 Q28 36 34 30" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">popcard<sup>&reg;</sup></span>
      </a>
      <nav class="nav">
        <a href="/#how">How it works</a>
        <a href="/examples">Examples</a>
        <a href="/pricing">Pricing</a>
        <a href="/account" class="user-chip" data-auth-only style="display:none">
          <img data-auth-picture alt="" referrerpolicy="no-referrer" />
          <span data-auth-name>Account</span>
        </a>
      </nav>
    </header>

    <main class="deck-view">
      <div class="deck-loading" id="deck-loading">Loading deck…</div>

      <div class="deck-error" id="deck-error" hidden></div>

      <div class="deck-meta" id="deck-meta" hidden>
        <a class="deck-breadcrumb" href="/account">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m11 18-6-6 6-6"/></svg>
          Your decks
        </a>
        <span class="tier-pill" id="deck-mode-pill"></span>
        <h1 class="deck-title" id="deck-title" title="Click to rename">Loading…</h1>
        <a class="deck-source" id="deck-source" target="_blank" rel="noopener" hidden></a>
        <div class="deck-meta-actions">
          <button type="button" class="deck-meta-btn" id="deck-pin" title="Pin to top of your decks" aria-label="Pin">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 3 7 7 .6-5.3 4.7 1.6 7.2L12 17.8 5.7 21.5l1.6-7.2L2 9.6 9 9z"/></svg>
            <span id="deck-pin-label">Pin</span>
          </button>
          <button type="button" class="deck-meta-btn" id="deck-rename" title="Rename this deck">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            Rename
          </button>
          <button type="button" class="deck-meta-btn deck-meta-btn-danger" id="deck-delete" title="Delete this deck">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="m19 6-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            Delete
          </button>
        </div>
      </div>

      <!-- Single-card view -->
      <div class="deck-card-wrap" id="deck-card-wrap" hidden>
        <div class="deck-card-flip" id="deck-card">
          <div class="deck-card-side deck-card-q">
            <div class="deck-card-topbar">
              <div class="deck-card-count" id="deck-card-count">1 / 1</div>
              <div class="deck-card-badges">
                <span class="deck-badge deck-badge-type" id="deck-card-type" hidden></span>
                <span class="deck-badge deck-badge-importance" id="deck-card-importance" hidden></span>
              </div>
            </div>
            <div class="deck-card-question" id="deck-card-question"></div>
            <!-- Inline answer + actions for simple mode -->
            <div class="deck-card-answer-inline" id="deck-card-answer-inline" hidden></div>
            <div class="deck-card-hint" id="deck-card-hint" hidden></div>
            <div class="deck-card-actions" id="deck-card-actions-front" hidden>
              <button type="button" class="deck-action" data-refine="simplify">Simplify</button>
              <button type="button" class="deck-action" data-refine="eli15">Explain like I'm 15</button>
              <button type="button" class="deck-action" data-refine="why">Why does this matter?</button>
            </div>
            <div class="deck-card-bottom">
              <a class="deck-card-timestamp" id="deck-card-timestamp" target="_blank" rel="noopener" hidden>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <span id="deck-card-timestamp-label">Watch this moment</span>
              </a>
              <div class="deck-card-tap" id="deck-card-tap-reveal">Tap to reveal</div>
            </div>
          </div>
          <div class="deck-card-side deck-card-a">
            <div class="deck-card-topbar">
              <div class="deck-card-count" id="deck-card-count-back">1 / 1</div>
              <div class="deck-card-badges">
                <span class="deck-badge deck-badge-type" id="deck-card-type-back" hidden></span>
              </div>
            </div>
            <div class="deck-card-answer" id="deck-card-answer"></div>
            <div class="deck-card-actions" id="deck-card-actions-back">
              <button type="button" class="deck-action" data-refine="simplify">Simplify</button>
              <button type="button" class="deck-action" data-refine="eli15">Explain like I'm 15</button>
              <button type="button" class="deck-action" data-refine="why">Why does this matter?</button>
            </div>
            <div class="deck-card-tap">Tap to hide</div>
          </div>
        </div>

        <div class="deck-controls">
          <button class="deck-nav-btn" id="deck-prev" type="button" aria-label="Previous card">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5"/><path d="m11 18-6-6 6-6"/>
            </svg>
          </button>
          <div class="deck-progress" id="deck-progress"></div>
          <button class="deck-nav-btn primary" id="deck-next" type="button" aria-label="Next card">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"/><path d="m13 6 6 6-6 6"/>
            </svg>
          </button>
        </div>

        <div class="deck-actions">
          <button type="button" class="deck-action-cta" id="deck-start-quiz" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 4 6v6c0 5 3.4 9.4 8 10 4.6-.6 8-5 8-10V6l-8-4z"/></svg>
            Take the quiz
          </button>
          <button type="button" class="deck-action-link deck-show-all" id="deck-show-all">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            See all cards
          </button>
          <span class="deck-action-sep">·</span>
          <a class="deck-action-link" href="/">Pop another</a>
        </div>
      </div>

      <!-- Quiz view -->
      <div class="deck-quiz-wrap" id="deck-quiz-wrap" hidden>
        <div class="deck-quiz-loading" id="deck-quiz-loading" hidden>
          <div class="quiz-spinner"></div>
          <p>Generating your quiz…</p>
          <span class="deck-quiz-loading-sub">Reading your cards and writing fresh questions</span>
        </div>

        <div class="deck-quiz-error" id="deck-quiz-error" hidden></div>

        <div class="deck-quiz-active" id="deck-quiz-active" hidden>
          <div class="deck-quiz-progress">
            <div class="deck-quiz-progress-bar"><span id="quiz-progress-fill"></span></div>
            <div class="deck-quiz-progress-text">
              Question <span id="quiz-current-num">1</span> of <span id="quiz-total-num">10</span>
            </div>
          </div>
          <h2 class="deck-quiz-question" id="quiz-question">…</h2>
          <div class="deck-quiz-options" id="quiz-options"></div>
          <div class="deck-quiz-feedback" id="quiz-feedback" hidden>
            <div class="deck-quiz-feedback-status" id="quiz-feedback-status"></div>
            <p class="deck-quiz-feedback-text" id="quiz-feedback-text"></p>
            <button type="button" class="deck-quiz-next" id="quiz-next">Next question →</button>
          </div>
        </div>

        <div class="deck-quiz-results" id="deck-quiz-results" hidden>
          <div class="deck-quiz-score">
            <div class="deck-quiz-score-emoji" id="quiz-score-emoji">🎉</div>
            <div class="deck-quiz-score-num" id="quiz-score-num">0/0</div>
            <div class="deck-quiz-score-label" id="quiz-score-label">Nicely done</div>
            <div class="deck-quiz-score-sub" id="quiz-score-sub"></div>
          </div>
          <div class="deck-quiz-results-actions">
            <button type="button" class="deck-action-cta" id="quiz-retake">Retake quiz</button>
            <button type="button" class="deck-action-link" id="quiz-back-deck">Back to cards</button>
          </div>
          <div class="deck-quiz-missed" id="quiz-missed-list" hidden></div>
        </div>
      </div>

      <!-- All-cards grid view -->
      <div class="deck-grid-wrap" id="deck-grid-wrap" hidden>
        <div class="deck-grid-header">
          <h2 class="deck-grid-title">All <span id="deck-grid-count">0</span> cards</h2>
          <button type="button" class="deck-grid-back" id="deck-grid-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5"/><path d="m11 18-6-6 6-6"/>
            </svg>
            Back to cards
          </button>
        </div>
        <div class="deck-grid" id="deck-grid"></div>
        <div class="deck-actions deck-actions-bottom">
          <a class="deck-action-link" href="/">Pop another</a>
        </div>
      </div>
    </main>
  </div>

  <script src="/analytics.js"></script>
  <script src="/cookies.js"></script>
  <script src="/auth.js"></script>
  <script src="/deck-view.js"></script>
</body>
</html>
